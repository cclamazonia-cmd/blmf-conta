<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastro — Biblioteca Libertária Maxwell Ferreira</title>
  <link rel="stylesheet" href="./css/app.css" />
  <style>
    body{
      background-image:url("https://cclamazonia.noblogs.org/files/2024/11/Arte-CCLA-paredao.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      background-repeat:no-repeat;
    }
    .card{
      background: rgba(27,27,27,0.92);
      backdrop-filter: blur(2px);
    }
    .brand { display:flex; gap:14px; align-items:center; margin-bottom:14px; }
    .brand img { width:56px; height:56px; object-fit:contain; }
    .subtitle { margin:6px 0 0; color:#cfcfcf; font-size:.95rem; line-height:1.3; }
    .small { color:#cfcfcf; font-size:.9rem; }
    .notice{
      border:1px solid rgba(255,255,255,0.18);
      background: rgba(200, 0, 0, 0.14);
      padding:10px 12px;
      border-radius:12px;
      margin: 0 0 12px;
      color:#fff;
    }
    .rowbtn { display:flex; gap:10px; align-items:center; justify-content:flex-start; flex-wrap:wrap; }
  </style>
</head>

<body>
  <main class="card">
    <div class="brand">
      <img
        src="https://cclamazonia.noblogs.org/files/2026/03/logo_detoure_BLMF.png"
        alt="Logotipo BLMF"
        onerror="this.style.display='none'"
      />
      <div style="flex:1;">
        <h1 style="margin:0;">Cadastro</h1>
        <p class="subtitle">Crie sua conta de leitor/a/e</p>
      </div>
    </div>

    <div class="notice">
      <b>Importante (segurança):</b>
      <div class="small">
        Após o primeiro acesso, você deverá alterar sua senha no <b>Painel</b>.
      </div>
    </div>

    <form id="signupForm" novalidate>
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="email" required />

      <label for="password">Senha provisória</label>
      <input id="password" type="password" autocomplete="new-password" required />

      <label for="password2">Confirmar senha</label>
      <input id="password2" type="password" autocomplete="new-password" required />

      <div class="rowbtn">
        <button type="submit">Criar conta</button>
        <button type="button" id="togglePw" class="secondary">Mostrar senha</button>
        <a href="./conta.html" class="secondary" style="text-decoration:none; padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,0.14);">Já tenho conta</a>
      </div>

      <p id="msg" class="msg" aria-live="polite"></p>
    </form>
  </main>

  <script type="module">
    import { supabase } from "./js/auth.js";

    const msg = document.getElementById("msg");
    const pw1 = document.getElementById("password");
    const pw2 = document.getElementById("password2");
    const togglePw = document.getElementById("togglePw");

    togglePw.addEventListener("click", () => {
      const show = pw1.type === "password";
      pw1.type = show ? "text" : "password";
      pw2.type = show ? "text" : "password";
      togglePw.textContent = show ? "Ocultar senha" : "Mostrar senha";
    });

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";

      const email = document.getElementById("email").value.trim();
      const p1 = pw1.value;
      const p2 = pw2.value;

      if (!email) { msg.textContent = "Informe um e-mail válido."; return; }
      if (!p1 || p1.length < 8) { msg.textContent = "A senha deve ter pelo menos 8 caracteres."; return; }
      if (p1 !== p2) { msg.textContent = "As senhas não coincidem."; return; }

      const { data, error } = await supabase.auth.signUp({ email, password: p1 });

      if (error) {
        msg.textContent = "Erro ao criar conta: " + error.message;
        return;
      }

      // Marca como "deve trocar senha" no perfil (opcional). Se a linha não existir ainda, cria.
      // Se existir um trigger que cria profiles, isto vira um update benigno depois.
      const userId = data?.user?.id;
      if (userId) {
        const { error: profErr } = await supabase
          .from("profiles")
          .upsert({
            id: userId,
            email,
            must_change_password: true,
            password_changed_at: null
          }, { onConflict: "id" });

        // Não trava o fluxo se falhar
        if (profErr) console.warn("profiles upsert warn:", profErr.message);
      }

      msg.textContent =
        "Conta criada. Se você tiver confirmação por e-mail ativada, verifique sua caixa de entrada. " +
        "Depois, faça login e altere sua senha no Painel.";

      // Redireciona para login
      setTimeout(() => { window.location.href = "./conta.html"; }, 900);
    });
  </script>
</body>
</html>
