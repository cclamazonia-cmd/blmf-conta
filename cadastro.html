<!-- cadastro.html -->
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastro — Biblioteca Libertária Maxwell Ferreira</title>
  <link rel="stylesheet" href="./css/app.css" />
  <style>
    body{
      background-image:url("https://cclamazonia.noblogs.org/files/2024/11/Arte-CCLA-paredao.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      background-repeat:no-repeat;
    }
    .card{
      background: rgba(27,27,27,0.92);
      backdrop-filter: blur(2px);
    }
    .brand { display:flex; gap:14px; align-items:center; margin-bottom:14px; }
    .brand img { width:56px; height:56px; object-fit:contain; }
    .subtitle { margin:6px 0 0; color:#cfcfcf; font-size:.95rem; line-height:1.3; }
    .hint { color:#cfcfcf; font-size:.95rem; margin-top:10px; }
    .required { color:#ffb4b4; font-size:.95rem; margin-top:10px; }
    .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    @media (max-width: 900px){ .grid3{ grid-template-columns:1fr; } }
  </style>
</head>

<body>
  <main class="card">
    <div class="brand">
      <img
        src="https://cclamazonia.noblogs.org/files/2026/03/logo_detoure_BLMF.png"
        alt="Logotipo BLMF"
        onerror="this.style.display='none'"
      />
      <div>
        <h1 style="margin:0;">Cadastro — Biblioteca Libertária Maxwell Ferreira</h1>
        <p class="subtitle">Conta do/a/e leitor/a/e</p>
      </div>
    </div>

    <p class="hint">
      Preencha os campos abaixo para criar sua conta. Campos obrigatórios devem ser preenchidos.
    </p>

    <form id="cadastroForm" novalidate>
      <div class="grid2">
        <div>
          <label for="firstName">Nome</label>
          <input type="text" id="firstName" autocomplete="given-name" required />
        </div>
        <div>
          <label for="lastName">Sobrenome</label>
          <input type="text" id="lastName" autocomplete="family-name" required />
        </div>
      </div>

      <label for="email">E-mail</label>
      <input type="email" id="email" autocomplete="email" required />

      <label for="phone">Telefone</label>
      <input type="tel" id="phone" autocomplete="tel" placeholder="+55 (xx) xxxxx-xxxx" />

      <label for="gender">Gênero</label>
      <select id="gender">
        <option value="">—</option>
        <option value="feminino">Feminino</option>
        <option value="masculino">Masculino</option>
        <option value="neutro">Neutro</option>
        <option value="não informar">Prefiro não informar</option>
        <option value="outro">Outro</option>
      </select>

      <hr />

      <h2 style="margin: 0 0 10px;">Endereço</h2>

      <label for="addr1">Endereço 1</label>
      <input type="text" id="addr1" autocomplete="address-line1" required />

      <label for="addr2">Endereço 2</label>
      <input type="text" id="addr2" autocomplete="address-line2" />

      <div class="grid3">
        <div>
          <label for="unit">Casa ou Apartamento nº</label>
          <input type="text" id="unit" placeholder="Ex.: Casa 2 / Ap. 301" />
        </div>
        <div>
          <label for="cep">CEP</label>
          <input type="text" id="cep" inputmode="numeric" autocomplete="postal-code" placeholder="00000-000" required />
        </div>
        <div>
          <label for="city">Cidade</label>
          <input type="text" id="city" autocomplete="address-level2" required />
        </div>
      </div>

      <div class="grid2">
        <div>
          <label for="state">Estado</label>
          <select id="state" required>
            <option value="">— selecione —</option>
            <option value="NSA">Não se aplica (NSA)</option>
            <option value="AC">Acre (AC)</option>
            <option value="AL">Alagoas (AL)</option>
            <option value="AP">Amapá (AP)</option>
            <option value="AM">Amazonas (AM)</option>
            <option value="BA">Bahia (BA)</option>
            <option value="CE">Ceará (CE)</option>
            <option value="DF">Distrito Federal (DF)</option>
            <option value="ES">Espírito Santo (ES)</option>
            <option value="GO">Goiás (GO)</option>
            <option value="MA">Maranhão (MA)</option>
            <option value="MT">Mato Grosso (MT)</option>
            <option value="MS">Mato Grosso do Sul (MS)</option>
            <option value="MG">Minas Gerais (MG)</option>
            <option value="PA">Pará (PA)</option>
            <option value="PB">Paraíba (PB)</option>
            <option value="PR">Paraná (PR)</option>
            <option value="PE">Pernambuco (PE)</option>
            <option value="PI">Piauí (PI)</option>
            <option value="RJ">Rio de Janeiro (RJ)</option>
            <option value="RN">Rio Grande do Norte (RN)</option>
            <option value="RS">Rio Grande do Sul (RS)</option>
            <option value="RO">Rondônia (RO)</option>
            <option value="RR">Roraima (RR)</option>
            <option value="SC">Santa Catarina (SC)</option>
            <option value="SP">São Paulo (SP)</option>
            <option value="SE">Sergipe (SE)</option>
            <option value="TO">Tocantins (TO)</option>
          </select>
        </div>

        <div>
          <label for="country">País</label>
          <select id="country" required>
            <option value="Brasil">Brasil</option>
            <option value="">— selecione —</option>
            <option value="Argentina">Argentina</option>
            <option value="Bolívia">Bolívia</option>
            <option value="Chile">Chile</option>
            <option value="Colômbia">Colômbia</option>
            <option value="Equador">Equador</option>
            <option value="Guiana">Guiana</option>
            <option value="Paraguai">Paraguai</option>
            <option value="Peru">Peru</option>
            <option value="Suriname">Suriname</option>
            <option value="Uruguai">Uruguai</option>
            <option value="Venezuela">Venezuela</option>
          </select>
        </div>
      </div>

      <hr />

      <label class="checkbox" for="consent">
        <input type="checkbox" id="consent" required />
        <span>
          Eu aceito que meu endereço de e-mail seja usado para o envio de informações sobre minha conta de leitor/a/e:
          disponibilização de documentos reservados, indicação da data de devolução dos documentos e avisos de atraso dos documentos emprestados.
        </span>
      </label>

      <p id="requiredMsg" class="required" style="display:none;">
        Você precisa marcar a caixa de consentimento para enviar o cadastro.
      </p>

      <button type="submit">Enviar cadastro</button>
      <button type="button" class="secondary" id="back">Voltar</button>

      <p id="msg" class="msg" aria-live="polite"></p>
    </form>
  </main>

  <script type="module">
    import { CONFIG } from "./js/config.js";

    const form = document.getElementById("cadastroForm");
    const msg = document.getElementById("msg");
    const requiredMsg = document.getElementById("requiredMsg");
    const consent = document.getElementById("consent");

    consent.addEventListener("invalid", () => {
      consent.setCustomValidity("Você precisa marcar esta caixa para continuar.");
    });
    consent.addEventListener("change", () => {
      consent.setCustomValidity("");
      requiredMsg.style.display = consent.checked ? "none" : "block";
    });

    document.getElementById("back").addEventListener("click", () => {
      window.location.href = "./conta.html";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      requiredMsg.style.display = "none";

      if (!consent.checked) {
        requiredMsg.style.display = "block";
        consent.focus();
        return;
      }
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const payload = {
        email: document.getElementById("email").value.trim(),
        first_name: document.getElementById("firstName").value.trim(),
        last_name: document.getElementById("lastName").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        gender: document.getElementById("gender").value,
        address_1: document.getElementById("addr1").value.trim(),
        address_2: document.getElementById("addr2").value.trim(),
        address_unit: document.getElementById("unit").value.trim(),
        cep: document.getElementById("cep").value.trim(),
        city: document.getElementById("city").value.trim(),
        state: document.getElementById("state").value,
        country: document.getElementById("country").value,
        consent_email: true
      };

      try {
        const res = await fetch(`${CONFIG.FUNCTIONS_BASE_URL}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const text = await res.text();
        let data = {};
        try { data = JSON.parse(text); } catch {}

        if (!res.ok) {
          msg.textContent = data.error || `Erro ao enviar o cadastro (HTTP ${res.status}).`;
          return;
        }

        // Affiche un succès même si les e-mails échouent (register est patché pour ne pas planter)
        if (data.email_usuaria_enviado === false) {
          msg.textContent =
            "Cadastro concluído, mas houve um problema ao enviar o e-mail automaticamente. " +
            "Entre em contato com a biblioteca para receber sua senha.";
        } else {
          msg.textContent = "Cadastro enviado com sucesso. Verifique seu e-mail (e Spam/Lixo eletrônico) para receber sua senha.";
        }

        form.reset();
      } catch (err) {
        msg.textContent = "Falha de rede ao enviar o cadastro. Tente novamente.";
      }
    });
  </script>
</body>
</html>
