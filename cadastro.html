<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BLMF — Cadastro / Entrar</title>
  <style>
    :root{
      --bg:#0b0b0c; --panel:rgba(18,18,18,.96);
      --text:#f2f2f2; --muted:rgba(255,255,255,.72);
      --red:#b30018; --red2:#e11d2f;
      --line:rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --ok:#4ade80; --warn:#fbbf24; --bad:#fb7185;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#000;color:var(--text);font-family: Inter, Segoe UI, Arial, sans-serif;}
    body{
      background-image:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.78)),
        url('https://cclamazonia.noblogs.org/files/2024/11/Arte-CCLA-paredao.jpg');
      background-size:cover; background-position:center; background-attachment:fixed; background-repeat:no-repeat;
    }
    a, a:visited{color:inherit}
    .wrap{max-width:980px;margin:0 auto;padding:24px}
    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin-bottom:14px;
    }
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      height:64px;width:auto;max-width:140px;object-fit:contain;display:block;flex-shrink:0;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
    }
    .brand h1{margin:0;font-size:1.15rem;letter-spacing:.02em}
    .brand p{margin:2px 0 0;color:var(--muted);font-size:.92rem}
    .btn{
      border:1px solid var(--line); background:rgba(18,18,18,.92);
      color:var(--text); border-radius:14px; padding:10px 12px;
      cursor:pointer; box-shadow: var(--shadow);
      font-weight:700; font-size:.95rem;
    }
    .btn.primary{border:none;background:linear-gradient(135deg,var(--red2),var(--red))}
    .btn:hover{border-color:rgba(255,255,255,.22)}
    .btn.primary:hover{filter:brightness(1.02)}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    .card{
      border:1px solid rgba(255,255,255,.08);
      background:var(--panel);
      border-radius:22px;
      padding:18px;
      box-shadow:var(--shadow);
    }
    .card h2{margin:0 0 10px;font-size:1.05rem}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media (max-width:720px){.row{grid-template-columns:1fr}}
    label{display:block;font-size:.9rem;color:var(--muted);margin:0 0 6px}
    .input{
      width:100%;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(12,12,12,.75);
      color:var(--text);
      border-radius:14px;
      padding:12px 12px;
      outline:none;
    }
    .input:focus{
      border-color:rgba(225,29,47,.85);
      box-shadow:0 0 0 3px rgba(225,29,47,.18);
    }
    .hint{color:var(--muted);font-size:.9rem;margin-top:8px}
    .status{margin-top:10px;font-size:.92rem}
    .status.ok{color:var(--ok)}
    .status.warn{color:var(--warn)}
    .status.bad{color:var(--bad)}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    .sep{height:1px;background:rgba(255,255,255,.08);margin:14px 0}
    .mini{font-size:.86rem;color:var(--muted)}
    .toggle{display:flex;align-items:center;gap:10px;margin-top:10px}
    .toggle input{transform:scale(1.15)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img class="logo" src="logo-blmf.png" alt="BLMF" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';" />
        <div id="logoFallback" style="display:none">
          <div style="font-weight:900;letter-spacing:.04em">BLMF</div>
          <div class="mini">Biblioteca Libertária Maxwell Ferreira</div>
        </div>
        <div>
          <h1>Cadastro / Entrar</h1>
          <p>Conta de leitor(a/e) — acesso e recuperação de senha</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn" id="btnBlog" type="button">Voltar ao blogue</button>
        <button class="btn" id="btnCatalogo" type="button">Voltar ao catálogo</button>
      </div>
    </div>

    <div class="grid">
      <div class="card" id="recoveryCard" style="display:none">
        <h2>Definir nova senha</h2>
        <div class="row">
          <div>
            <label for="newPass">Nova senha</label>
            <input class="input" id="newPass" type="password" autocomplete="new-password" />
            <div class="toggle">
              <input id="showNewPass" type="checkbox" />
              <label for="showNewPass" style="margin:0;color:var(--muted)">Mostrar senha</label>
            </div>
          </div>
          <div>
            <label for="newPass2">Confirmar nova senha</label>
            <input class="input" id="newPass2" type="password" autocomplete="new-password" />
          </div>
        </div>
        <div class="actions">
          <button class="btn primary" id="btnSetPass" type="button">Salvar nova senha</button>
          <button class="btn" id="btnGoConta" type="button">Ir para minha conta</button>
        </div>
        <div class="status" id="recoveryStatus"></div>
      </div>

      <div class="card" id="loginCard">
        <h2>Entrar</h2>
        <div class="row">
          <div>
            <label for="email">E-mail</label>
            <input class="input" id="email" type="email" autocomplete="email" placeholder="seuemail@exemplo.org" />
          </div>
          <div>
            <label for="password">Senha</label>
            <input class="input" id="password" type="password" autocomplete="current-password" />
            <div class="toggle">
              <input id="showPass" type="checkbox" />
              <label for="showPass" style="margin:0;color:var(--muted)">Mostrar senha</label>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" id="btnLogin" type="button">Entrar</button>
          <button class="btn" id="btnLogout" type="button" style="display:none">Sair</button>
        </div>
        <div class="status" id="loginStatus"></div>

        <div class="sep"></div>

        <h2>Esqueci minha senha</h2>
        <div class="row">
          <div>
            <label for="resetEmail">E-mail</label>
            <input class="input" id="resetEmail" type="email" autocomplete="email" placeholder="seuemail@exemplo.org" />
            <div class="hint">Vamos enviar um link para redefinir sua senha.</div>
          </div>
          <div style="display:flex;align-items:flex-end">
            <button class="btn" id="btnReset" type="button" style="width:100%">Enviar link</button>
          </div>
        </div>
        <div class="status" id="resetStatus"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const ROUTES = {
      BLOG_HOME: "https://cclamazonia.noblogs.org/",
      CATALOGO: "https://cclamazonia.github.io/blmf-catalogo/index.html",
      LIVRO: "https://cclamazonia.github.io/blmf-catalogo/livro.html",
      CADASTRO: "https://cclamazonia.github.io/blmf-conta/cadastro.html",
      CONTA: "https://cclamazonia.github.io/blmf-conta/conta.html",
      PAINEL: "https://cclamazonia.github.io/blmf-conta/painel.html",
    };

    const SUPABASE_URL = "https://asptfmokzykwzlshsncw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzcHRmbW9renlrd3psc2hzbmN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzcxNzcsImV4cCI6MjA4ODExMzE3N30.JkMLHPCV2AH5ELZV_1RfcoW250QEofLGvnDKSDpkcn0";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    const $ = (id) => document.getElementById(id);
    const setStatus = (el, msg, cls) => {
      el.className = "status" + (cls ? " " + cls : "");
      el.textContent = msg || "";
    };

    $("btnBlog").addEventListener("click", () => location.assign(ROUTES.BLOG_HOME));
    $("btnCatalogo").addEventListener("click", () => location.assign(ROUTES.CATALOGO));

    $("showPass").addEventListener("change", (e) => {
      $("password").type = e.target.checked ? "text" : "password";
    });
    $("showNewPass").addEventListener("change", (e) => {
      $("newPass").type = e.target.checked ? "text" : "password";
      $("newPass2").type = e.target.checked ? "text" : "password";
    });

    async function getProfileRole() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.user?.id) return null;
      // tenta profiles.role; se não existir, só retorna "leitor"
      const { data, error } = await supabase.from("profiles").select("role").eq("id", session.user.id).maybeSingle();
      if (error) return "leitor";
      return data?.role || "leitor";
    }

    async function routeAfterLogin() {
      const role = await getProfileRole();
      if (role === "bibliotecario" || role === "admin") location.assign(ROUTES.PAINEL);
      else location.assign(ROUTES.CONTA);
    }

    async function refreshUI() {
      const { data: { session } } = await supabase.auth.getSession();
      $("btnLogout").style.display = session ? "inline-block" : "none";
      if (session) {
        setStatus($("loginStatus"), "Você já está logado(a/e).", "ok");
      } else {
        setStatus($("loginStatus"), "", "");
      }
    }

    async function detectRecovery() {
      // Se veio de link de recuperação, o detectSessionInUrl costuma criar sessão.
      const url = new URL(location.href);
      const type = url.searchParams.get("type");
      const { data: { session } } = await supabase.auth.getSession();
      const isRecovery = (type === "recovery") || (session && url.hash.includes("access_token"));
      if (isRecovery) {
        $("recoveryCard").style.display = "block";
        $("loginCard").style.display = "block";
      }
    }

    $("btnLogin").addEventListener("click", async () => {
      setStatus($("loginStatus"), "", "");
      const email = $("email").value.trim();
      const password = $("password").value;
      if (!email || !password) return setStatus($("loginStatus"), "Preencha e-mail e senha.", "warn");

      $("btnLogin").disabled = true;
      try {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) return setStatus($("loginStatus"), "Não foi possível entrar: " + error.message, "bad");
        setStatus($("loginStatus"), "Entrou com sucesso. Redirecionando…", "ok");
        await routeAfterLogin();
      } finally {
        $("btnLogin").disabled = false;
      }
    });

    $("btnLogout").addEventListener("click", async () => {
      $("btnLogout").disabled = true;
      try {
        await supabase.auth.signOut();
        // limpeza extra (caso algum código antigo tenha guardado coisas)
        try { localStorage.removeItem("blmf"); } catch {}
        setStatus($("loginStatus"), "Você saiu da conta.", "ok");
      } finally {
        $("btnLogout").disabled = false;
        await refreshUI();
      }
    });

    $("btnReset").addEventListener("click", async () => {
      setStatus($("resetStatus"), "", "");
      const email = $("resetEmail").value.trim();
      if (!email) return setStatus($("resetStatus"), "Informe seu e-mail.", "warn");

      $("btnReset").disabled = true;
      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: ROUTES.CADASTRO });
        if (error) return setStatus($("resetStatus"), "Erro ao enviar link: " + error.message, "bad");
        setStatus($("resetStatus"), "Link enviado. Verifique sua caixa de e-mail.", "ok");
      } finally {
        $("btnReset").disabled = false;
      }
    });

    $("btnSetPass").addEventListener("click", async () => {
      setStatus($("recoveryStatus"), "", "");
      const p1 = $("newPass").value;
      const p2 = $("newPass2").value;
      if (!p1 || p1.length < 8) return setStatus($("recoveryStatus"), "Use uma senha com pelo menos 8 caracteres.", "warn");
      if (p1 !== p2) return setStatus($("recoveryStatus"), "As senhas não coincidem.", "warn");

      $("btnSetPass").disabled = true;
      try {
        const { error } = await supabase.auth.updateUser({ password: p1 });
        if (error) return setStatus($("recoveryStatus"), "Erro ao salvar senha: " + error.message, "bad");
        setStatus($("recoveryStatus"), "Senha atualizada com sucesso.", "ok");
      } finally {
        $("btnSetPass").disabled = false;
      }
    });

    $("btnGoConta").addEventListener("click", async () => {
      await routeAfterLogin();
    });

    await detectRecovery();
    await refreshUI();
  </script>
</body>
</html>
