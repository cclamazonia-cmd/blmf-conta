<!-- conta.html -->
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Conta do/a/e leitor/a/e — Biblioteca Libertária Maxwell Ferreira</title>
  <link rel="stylesheet" href="./css/app.css" />
  <style>
    body{
      background-image:url("https://cclamazonia.noblogs.org/files/2024/11/Arte-CCLA-paredao.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      background-repeat:no-repeat;
    }
    .card{
      background: rgba(27,27,27,0.92);
      backdrop-filter: blur(2px);
    }
    .brand {
      display:flex;
      gap:14px;
      align-items:center;
      margin-bottom:14px;
    }
    .brand img{
      width:56px;height:56px;object-fit:contain;
    }
    .subtitle{ margin:6px 0 0; color:#cfcfcf; font-size:.95rem; line-height:1.3; }
    .topActions{ display:flex; gap:10px; flex-wrap:wrap; margin: 10px 0 14px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <img
        src="https://cclamazonia.noblogs.org/files/2026/03/logo_detoure_BLMF.png"
        alt="Logotipo BLMF"
        onerror="this.style.display='none'"
      />
      <div>
        <h1 style="margin:0;">Conta do/a/e leitor/a/e</h1>
        <p class="subtitle">Biblioteca Libertária Maxwell Ferreira</p>
      </div>
    </div>

    <div class="topActions">
      <button id="backBlog" class="secondary">Voltar ao blogue</button>
      <button id="goCadastro" class="secondary">Cadastrar-se</button>
    </div>

    <form id="loginForm">
      <label for="email">E-mail</label>
      <input type="email" id="email" required />

      <label for="password">Senha</label>
      <input type="password" id="password" required />

      <button type="submit">Entrar</button>
    </form>

    <p id="msg" class="msg" aria-live="polite"></p>
  </main>

  <script type="module">
    import { supabase } from "./js/auth.js";

    const BLOG_URL = "https://cclamazonia.noblogs.org/catalogo-da-biblioteca-libertaria-maxwell-ferreira/";

    document.getElementById("backBlog").addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = BLOG_URL;
    });
document.getElementById("goCadastro").addEventListener("click", () => {
      window.location.href = "./cadastro.html";
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.textContent = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        msg.textContent = "Falha no login: " + error.message;
        return;
      }
      window.location.href = "./painel.html";
    });
  </script>
</body>
</html>
